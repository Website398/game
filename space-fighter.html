<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Star Raider — Space Fighter</title>
<style>
  :root{
    --void:#05060f;
    --void2:#0a0d1f;
    --neon:#33e6ff;
    --neon2:#ff3d7a;
    --amber:#ffb92e;
    --hull:#e8f0ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--void);
    font-family:'Courier New', monospace;
    color:var(--hull);
    touch-action:none;
    user-select:none;
  }
  #wrap{
    position:relative;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas{
    display:block;
    background:radial-gradient(ellipse at 50% 20%, #0d1230 0%, #05060f 70%);
    max-width:100vw; max-height:100vh;
  }
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 18px;
    pointer-events:none;
    letter-spacing:1px;
  }
  .hud-block{
    background:rgba(5,6,15,0.55);
    border:1px solid rgba(51,230,255,0.35);
    padding:6px 12px;
    font-size:13px;
    line-height:1.5;
  }
  .hud-title{ color:var(--neon); font-size:10px; opacity:0.8; }
  .hud-val{ color:var(--hull); font-size:16px; }
  #lives{ color:var(--neon2); }
  #overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(5,6,15,0.86);
    text-align:center;
    padding:24px;
  }
  #overlay h1{
    font-size:clamp(22px,6vw,40px);
    margin:0 0 8px;
    color:var(--neon);
    letter-spacing:4px;
    text-shadow:0 0 12px rgba(51,230,255,0.6);
  }
  #overlay p{
    color:#9aa4c7; font-size:13px; max-width:360px; line-height:1.7; margin:6px 0 20px;
  }
  #overlay .sub{ color:var(--neon2); font-size:20px; margin-bottom:4px; letter-spacing:2px; }
  button{
    font-family:inherit;
    background:transparent;
    color:var(--neon);
    border:1.5px solid var(--neon);
    padding:12px 28px;
    font-size:15px;
    letter-spacing:2px;
    cursor:pointer;
    transition:all .15s;
  }
  button:hover{ background:var(--neon); color:var(--void); }
  button:active{ transform:scale(0.96); }
  .hidden{ display:none !important; }
  #touchControls{
    position:absolute; bottom:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:0 16px 22px;
    pointer-events:none;
  }
  #touchControls.active{ display:flex; }
  .pad, .fireBtn{
    pointer-events:auto;
    background:rgba(51,230,255,0.08);
    border:1px solid rgba(51,230,255,0.4);
    display:flex; align-items:center; justify-content:center;
    color:var(--neon);
    font-size:22px;
  }
  .pad{ width:64px; height:64px; border-radius:50%; margin-right:10px; }
  #padRow{ display:flex; }
  .fireBtn{
    width:78px; height:78px; border-radius:50%;
    border-color:rgba(255,61,122,0.5);
    background:rgba(255,61,122,0.1);
    color:var(--neon2);
    font-size:13px; letter-spacing:1px;
  }
  #tip{
    position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
    font-size:11px; color:#5c6690; letter-spacing:1px; pointer-events:none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-block">
      <div class="hud-title">SCORE</div>
      <div class="hud-val" id="score">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-title">WAVE</div>
      <div class="hud-val" id="wave">1</div>
    </div>
    <div class="hud-block">
      <div class="hud-title">HULL</div>
      <div class="hud-val" id="lives">♥ ♥ ♥</div>
    </div>
  </div>

  <div id="overlay">
    <div class="sub" id="overlaySub">STAR RAIDER</div>
    <h1 id="overlayTitle">SPACE FIGHTER</h1>
    <p id="overlayText">Dushman jahaazon ko destroy karo, asteroids se bacho aur high score banao.<br>Arrow keys ya WASD se move karo, Space se fire karo.<br>Mobile par touch controls automatically aa jayenge.</p>
    <button id="startBtn">START MISSION</button>
  </div>

  <div id="touchControls">
    <div id="padRow">
      <div class="pad" id="btnLeft">◀</div>
      <div class="pad" id="btnUp">▲</div>
      <div class="pad" id="btnDown">▼</div>
      <div class="pad" id="btnRight">▶</div>
    </div>
    <div class="fireBtn" id="btnFire">FIRE</div>
  </div>

  <div id="tip">ARROWS / WASD — MOVE &nbsp;•&nbsp; SPACE — FIRE &nbsp;•&nbsp; P — PAUSE</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlaySub = document.getElementById('overlaySub');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const waveEl = document.getElementById('wave');
  const livesEl = document.getElementById('lives');
  const touchControls = document.getElementById('touchControls');

  let W, H;
  function resize(){
    const ratio = Math.min(window.innerWidth, 520);
    W = ratio;
    H = Math.min(window.innerHeight, 780);
    canvas.width = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if(isTouch) touchControls.classList.add('active');

  // ---------- Starfield ----------
  let stars = [];
  function initStars(){
    stars = [];
    for(let i=0;i<90;i++){
      stars.push({
        x: Math.random()*W,
        y: Math.random()*H,
        z: Math.random()*2+0.3,
        r: Math.random()*1.6+0.4
      });
    }
  }
  initStars();

  // ---------- Game state ----------
  let running = false;
  let paused = false;
  let score = 0;
  let wave = 1;
  let lives = 3;
  let frame = 0;
  let shakeT = 0;

  const player = {
    x: 0, y: 0, w: 30, h: 34,
    speed: 4.2,
    cooldown: 0,
    invuln: 0
  };

  let bullets = [];
  let enemyBullets = [];
  let enemies = [];
  let particles = [];
  let stars2 = [];

  const keys = {};
  window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    if(e.key === ' ') e.preventDefault();
    if(e.key.toLowerCase()==='p' && running) togglePause();
  });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

  function bindHold(id, keyName){
    const el = document.getElementById(id);
    const set = v => ()=>{ keys[keyName]=v; };
    el.addEventListener('touchstart', e=>{ e.preventDefault(); keys[keyName]=true; }, {passive:false});
    el.addEventListener('touchend', e=>{ e.preventDefault(); keys[keyName]=false; }, {passive:false});
    el.addEventListener('mousedown', set(true));
    el.addEventListener('mouseup', set(false));
    el.addEventListener('mouseleave', set(false));
  }
  bindHold('btnLeft','arrowleft');
  bindHold('btnRight','arrowright');
  bindHold('btnUp','arrowup');
  bindHold('btnDown','arrowdown');
  bindHold('btnFire',' ');

  function resetGame(){
    score = 0; wave = 1; lives = 3; frame = 0;
    bullets = []; enemyBullets = []; enemies = []; particles = [];
    player.x = W/2; player.y = H - 90; player.cooldown = 0; player.invuln = 90;
    spawnWave();
    updateHud();
  }

  function updateHud(){
    scoreEl.textContent = score;
    waveEl.textContent = wave;
    let hearts = '';
    for(let i=0;i<lives;i++) hearts += '♥ ';
    livesEl.textContent = hearts.trim() || '—';
  }

  function spawnWave(){
    const count = 4 + wave;
    for(let i=0;i<count;i++){
      enemies.push({
        x: 30 + Math.random()*(W-60),
        y: -40 - Math.random()*260,
        w: 24, h: 22,
        speed: 0.6 + Math.random()*0.5 + wave*0.08,
        hp: 1 + Math.floor(wave/3),
        fireT: Math.floor(Math.random()*160)+80,
        dir: Math.random() < 0.5 ? -1 : 1,
        sway: Math.random()*Math.PI*2
      });
    }
  }

  function rectHit(a,b){
    return Math.abs(a.x-b.x) < (a.w+b.w)/2 && Math.abs(a.y-b.y) < (a.h+b.h)/2;
  }

  function spawnParticles(x,y,color,n){
    for(let i=0;i<n;i++){
      const ang = Math.random()*Math.PI*2;
      const spd = Math.random()*3+1;
      particles.push({
        x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        life: 26+Math.random()*14, maxLife: 40, color
      });
    }
  }

  function togglePause(){
    paused = !paused;
    if(paused){
      overlaySub.textContent = 'PAUSED';
      overlayTitle.textContent = 'MISSION HOLD';
      overlayText.innerHTML = 'Game rukka hua hai.<br>Resume karne ke liye button dabao ya P key press karo.';
      startBtn.textContent = 'RESUME';
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
      loopTime = performance.now();
      requestAnimationFrame(loop);
    }
  }

  startBtn.addEventListener('click', ()=>{
    if(paused){ togglePause(); return; }
    overlay.classList.add('hidden');
    running = true;
    resetGame();
    loopTime = performance.now();
    requestAnimationFrame(loop);
  });

  function gameOver(){
    running = false;
    overlaySub.textContent = 'MISSION OVER';
    overlayTitle.textContent = 'SHIP DESTROYED';
    overlayText.innerHTML = `Final Score: <span style="color:var(--neon)">${score}</span> &nbsp;•&nbsp; Wave Reached: <span style="color:var(--neon2)">${wave}</span><br>Dobara try karo, is baar aur door tak jao.`;
    startBtn.textContent = 'RETRY MISSION';
    overlay.classList.remove('hidden');
  }

  let loopTime = 0;
  function loop(now){
    if(!running || paused) return;
    const dt = Math.min((now - loopTime)/16.67, 2.2);
    loopTime = now;
    frame++;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    // player movement
    let mvx=0, mvy=0;
    if(keys['arrowleft']||keys['a']) mvx -= 1;
    if(keys['arrowright']||keys['d']) mvx += 1;
    if(keys['arrowup']||keys['w']) mvy -= 1;
    if(keys['arrowdown']||keys['s']) mvy += 1;
    const len = Math.hypot(mvx,mvy) || 1;
    player.x += (mvx/len) * player.speed * dt;
    player.y += (mvy/len) * player.speed * dt;
    player.x = Math.max(20, Math.min(W-20, player.x));
    player.y = Math.max(40, Math.min(H-20, player.y));

    if(player.invuln>0) player.invuln -= dt;
    if(player.cooldown>0) player.cooldown -= dt;
    if(keys[' '] && player.cooldown<=0){
      bullets.push({x:player.x-8, y:player.y-14, w:3, h:10, speed:8});
      bullets.push({x:player.x+8, y:player.y-14, w:3, h:10, speed:8});
      player.cooldown = 9;
    }

    bullets.forEach(b=> b.y -= b.speed*dt );
    bullets = bullets.filter(b=> b.y > -20);

    enemyBullets.forEach(b=> b.y += b.speed*dt );
    enemyBullets = enemyBullets.filter(b=> b.y < H+20);

    enemies.forEach(en=>{
      en.y += en.speed*dt;
      en.sway += 0.03*dt;
      en.x += Math.sin(en.sway)*0.6*dt;
      en.x = Math.max(20, Math.min(W-20, en.x));
      en.fireT -= dt;
      if(en.fireT<=0 && en.y>0){
        enemyBullets.push({x:en.x, y:en.y+14, w:3, h:9, speed:4+wave*0.15});
        en.fireT = 90 + Math.random()*140;
      }
    });

    // bullets vs enemies
    for(let i=enemies.length-1;i>=0;i--){
      const en = enemies[i];
      for(let j=bullets.length-1;j>=0;j--){
        const b = bullets[j];
        if(rectHit(en,b)){
          bullets.splice(j,1);
          en.hp--;
          spawnParticles(b.x,b.y,'51,230,255',4);
          if(en.hp<=0){
            score += 10;
            spawnParticles(en.x,en.y,'255,185,46',18);
            enemies.splice(i,1);
          }
          break;
        }
      }
    }

    // enemy reach bottom / collide player
    if(player.invuln<=0){
      for(let i=enemies.length-1;i>=0;i--){
        if(rectHit(enemies[i], player)){
          enemies.splice(i,1);
          hitPlayer();
        }
      }
      for(let i=enemyBullets.length-1;i>=0;i--){
        if(rectHit(enemyBullets[i], player)){
          enemyBullets.splice(i,1);
          hitPlayer();
        }
      }
    }

    enemies = enemies.filter(en=>{
      if(en.y > H+40){ return false; }
      return true;
    });

    particles.forEach(p=>{
      p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
    });
    particles = particles.filter(p=>p.life>0);

    if(enemies.length===0){
      wave++;
      updateHud();
      spawnWave();
    }

    if(shakeT>0) shakeT -= dt;
  }

  function hitPlayer(){
    lives--;
    player.invuln = 100;
    shakeT = 14;
    spawnParticles(player.x, player.y, '255,61,122', 22);
    updateHud();
    if(lives<=0){
      spawnParticles(player.x, player.y, '255,185,46', 40);
      gameOver();
    }
  }

  function drawShip(x,y,scale,color,glow){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(scale,scale);
    ctx.shadowColor = glow;
    ctx.shadowBlur = 10;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0,-17);
    ctx.lineTo(11,14);
    ctx.lineTo(4,9);
    ctx.lineTo(0,13);
    ctx.lineTo(-4,9);
    ctx.lineTo(-11,14);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawEnemy(en){
    ctx.save();
    ctx.translate(en.x,en.y);
    ctx.shadowColor = '#ff3d7a';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ff5a8f';
    ctx.beginPath();
    ctx.moveTo(0,12);
    ctx.lineTo(11,-10);
    ctx.lineTo(4,-6);
    ctx.lineTo(0,-11);
    ctx.lineTo(-4,-6);
    ctx.lineTo(-11,-10);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function render(){
    ctx.clearRect(0,0,W,H);

    let shakeX=0, shakeY=0;
    if(shakeT>0){
      shakeX = (Math.random()-0.5)*shakeT*0.6;
      shakeY = (Math.random()-0.5)*shakeT*0.6;
    }
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // stars
    ctx.fillStyle='rgba(255,255,255,0.8)';
    stars.forEach(s=>{
      s.y += s.z*0.6;
      if(s.y>H){ s.y=-2; s.x=Math.random()*W; }
      ctx.globalAlpha = 0.3 + s.z*0.3;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // particles
    particles.forEach(p=>{
      ctx.globalAlpha = Math.max(p.life/p.maxLife,0);
      ctx.fillStyle = `rgb(${p.color})`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,2,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // bullets
    ctx.fillStyle = '#33e6ff';
    ctx.shadowColor = '#33e6ff';
    ctx.shadowBlur = 6;
    bullets.forEach(b=> ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h));
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffb92e';
    ctx.shadowColor = '#ffb92e';
    ctx.shadowBlur = 6;
    enemyBullets.forEach(b=> ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h));
    ctx.shadowBlur = 0;

    // enemies
    enemies.forEach(drawEnemy);

    // player
    if(running){
      const blink = player.invuln>0 && Math.floor(frame/4)%2===0;
      if(!blink) drawShip(player.x, player.y, 1, '#e8f0ff', '#33e6ff');
    }

    ctx.restore();
  }

  render();
})();
</script>
</body>
</html>
